version: '3.8'
services:
  web:
    build: .
    container_name: projetoPW
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
    depends_on:
      - db

  db:
    image: mysql:8.0
    container_name: mysql_projeto
    restart: always
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: bancovini
      MYSQL_ROOT_PASSWORD: root     
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: